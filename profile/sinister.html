<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シニスターのプロフィール</title>
    <style>
        :root {
            --bg-page: #efefef;
            --bg-header: #006600;
            --header-text: #ffffff;
            --bg-content: #eeeeee;
            --bg-res: #f5f5f5;
            --border-color: #999999;
            --border-strong: #333333;
            --text-main: #000000;
            --text-muted: #555555;
            --name-color: #008000;
            --link-color: #0000ee;
            --accent: #cc0000;
        }
        body.dark-theme {
            --bg-page: #0d0f0d;
            --bg-header: #001a00;
            --header-text: #00ff66;
            --bg-content: #111511;
            --bg-res: #131813;
            --border-color: #2f3f2f;
            --border-strong: #3f5f3f;
            --text-main: #cfe8cf;
            --text-muted: #7fa87f;
            --name-color: #33ff66;
            --link-color: #55aaff;
            --accent: #ff5555;
        }
        * { box-sizing: border-box; }
        body {
            font-family: "MS PGothic", "ＭＳ Ｐゴシック", "Hiragino Kaku Gothic ProN", monospace, sans-serif;
            font-size: 13px;
            background-color: var(--bg-page);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            transition: background 0.2s, color 0.2s;
        }
        .board-header {
            background: var(--bg-header);
            color: var(--header-text);
            padding: 10px 16px 6px;
            text-align: center;
            border-bottom: 3px solid var(--border-strong);
        }
        .board-title { font-size: 1.1rem; font-weight: bold; letter-spacing: 0.05em; }
        .nav-bar {
            background: var(--bg-content);
            border-bottom: 1px solid var(--border-color);
            padding: 6px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-res);
            border: 1px solid var(--border-strong);
            border-radius: 2px;
            padding: 4px 10px;
            cursor: pointer;
            color: var(--text-main);
            font-size: 0.8rem;
            font-family: inherit;
        }
        .theme-toggle:hover { border-color: var(--accent); }

        .profile-container {
            background-color: var(--bg-content);
            max-width: 600px;
            margin: 24px auto;
            padding: 0;
            border: 1px solid var(--border-strong);
        }
        .card-header {
            background: var(--bg-res);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 14px;
        }
        .member-name-title { color: var(--name-color); font-weight: bold; font-size: 1rem; }

        .card-body { padding: 24px; text-align: center; }
        .avatar {
            width: 100px;
            height: 100px;
            background-color: var(--bg-res);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            overflow: hidden;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .role {
            display: inline-block;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }
        .introduction {
            text-align: left;
            line-height: 1.8;
            background: var(--bg-res);
            border: 1px solid var(--border-color);
            padding: 16px;
            margin-bottom: 20px;
        }
        .back-button {
            display: inline-block;
            padding: 8px 18px;
            background-color: var(--bg-header);
            color: var(--header-text);
            text-decoration: none;
            border: 1px solid var(--border-strong);
            font-size: 0.85rem;
        }
        .back-button:hover { opacity: 0.85; }
    </style>
</head>
<body>

    <div class="board-header">
        <div class="board-title">■ ひきがたり・うたわくWIKI ■</div>
    </div>
    <div class="nav-bar">
        <div>[ <a href="https://hikigatariofficial.netlify.app/" target="_blank" style="color:var(--link-color);">ホームページ</a> ]</div>
        <button class="theme-toggle" id="themeToggleBtn" type="button" aria-label="テーマ切り替え">
            <span class="icon" id="themeIcon">☀️</span>
            <span id="themeLabel">ライト</span>
        </button>
    </div>

    <div class="profile-container">
        <div class="card-header">
            名前：<span class="member-name-title">シニスター</span>
        </div>
        <div class="card-body">
            <!-- アイコン画像：images/aki.jpg を表示 -->
             <div class="avatar">👽</div>
            <div class="role">チームメンバー</div>

            <div class="introduction">
                <p>しにすたー
                趣味はゲームと雑談すること
                ここのオプの治安維持してます、あとニキの妻だよ</p>
            </div>

            <!-- 一覧ページに戻るためのリンク（「../」で1つ上のフォルダに戻るという意味になります） -->
            <a href="../index.html" class="back-button">← メンバー一覧に戻る</a>
        </div>
    </div>

    <script>
        (function () {
            var body = document.body;
            var btn = document.getElementById('themeToggleBtn');
            var icon = document.getElementById('themeIcon');
            var label = document.getElementById('themeLabel');

            function applyTheme(isDark) {
                body.classList.toggle('dark-theme', isDark);
                icon.textContent = isDark ? '🌙' : '☀️';
                label.textContent = isDark ? 'ダーク' : 'ライト';
            }

            var saved = null;
            try {
                saved = localStorage.getItem('wikiTheme');
            } catch (e) { /* localStorageが使えない環境でも無視 */ }
            applyTheme(saved === 'dark');

            btn.addEventListener('click', function () {
                var willBeDark = !body.classList.contains('dark-theme');
                applyTheme(willBeDark);
                try {
                    localStorage.setItem('wikiTheme', willBeDark ? 'dark' : 'light');
                } catch (e) { /* 保存できなくても動作は継続 */ }
            });
        })();
    </script>

</body>
</html>
