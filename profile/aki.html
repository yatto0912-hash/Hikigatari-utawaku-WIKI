<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あき のプロフィール</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .profile-container {
            background-color: #ffffff;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        .avatar {
            width: 120px;
            height: 120px;
            background-color: #e2e8f0;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .role {
            color: #3498db;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .introduction {
            text-align: left;
            line-height: 1.8;
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .back-button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #2c3e50;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .back-button:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <!-- 顔写真の代わりに、仮の丸アイコンを表示（後で画像に変更可能） -->
        <div class="avatar">👤</div>
        
        <h1>あき</h1>
        <div class="role">チームメンバー</div>
        
        <div class="introduction">
            <p>ここに詳細なプロフィールや自己紹介文、得意なこと、コメントなどを自由に書くことができます！</p>
        </div>
        
        <!-- 一覧ページに戻るためのリンク（「../」で1つ上のフォルダに戻るという意味になります） -->
        <a href="../index.html" class="back-button">← メンバー一覧に戻る</a>
    </div>

</body>
</html>
