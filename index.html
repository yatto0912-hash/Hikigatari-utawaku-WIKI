    <title>チームメンバー紹介Wiki</title>
    <style>
        /* 画面全体のスタイル */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #2c3e50;
        }
        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        /* リンクをカード全体に適応し、下線を消す設定 */
        .member-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        /* メンバーカードの見た目 */
        .member-card {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
        }
        /* マウスを乗せたときの演出 */
        .member-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            background-color: #f8fafd;
        }
        .member-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
